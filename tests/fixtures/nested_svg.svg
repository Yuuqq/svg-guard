<svg viewBox="0 0 400 200" width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="10" width="380" height="180" fill="#fafafa" stroke="#ccc"/>
  <!-- Nested <svg> with its own viewBox: must not crash detection. -->
  <svg x="20" y="20" width="200" height="100" viewBox="0 0 200 100">
    <rect x="5" y="5" width="190" height="40" fill="#eee" stroke="#999"/>
    <text x="10" y="30" font-family="sans-serif" font-size="14">inner label that fits</text>
  </svg>
  <text x="15" y="180" font-family="sans-serif" font-size="16">outer label within bounds</text>
</svg>
